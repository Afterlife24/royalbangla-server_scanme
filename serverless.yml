service: royalbangla-api-lambda

provider:
  name: aws
  runtime: nodejs18.x
  region: eu-west-3
  environment:
    MONGO_URI: ${env:MONGO_URI}
    EMAIL_USER: scanme684@gmail.com
    EMAIL_PASS: hpirnotiheyrofzb
  httpApi:
    cors: 
      allowedOrigins:
        - https://www.royalbangla-scanme.afterlife.org.in
        - https://www.royalbangla-admin.afterlife.org.in
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization

functions:
  app:
    handler: lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: '*'

plugins:
  - serverless-offline

package:
  exclude:
    - node_modules/aws-sdk/**
